services:
  coredns:
    build: .
    image: ${TEST_IMAGE:-joyride-test-coredns}
    container_name: coredns-test
    user: root
    ports:
      - "54:54/udp"
      - "54:54/tcp"
      - "5454:5454"
    environment:
      - HOSTIP=192.168.1.100
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./Corefile:/etc/coredns/Corefile:ro
      - ./etc/joyride/hosts.d:/etc/hosts.d:ro
    networks:
      - test-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:5454/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  # Test container with coredns.host.name label
  test-app-coredns:
    image: nginx:alpine
    container_name: test-app-coredns
    labels:
      - "coredns.host.name=test-coredns.example.com"
    networks:
      - test-net
    depends_on:
      coredns:
        condition: service_healthy

  # Test container with joyride.host.name label (backward compatibility)
  test-app-joyride:
    image: nginx:alpine
    container_name: test-app-joyride
    labels:
      - "joyride.host.name=test-joyride.example.com"
    networks:
      - test-net
    depends_on:
      coredns:
        condition: service_healthy

  # Test container with multiple hostnames (comma-separated)
  test-app-multi:
    image: nginx:alpine
    container_name: test-app-multi
    labels:
      - "coredns.host.name=app1.example.com,app2.example.com,app3.example.com"
    networks:
      - test-net
    depends_on:
      coredns:
        condition: service_healthy

  # DNS tester container
  dns-tester:
    image: alpine:3.20
    container_name: dns-tester
    environment:
      - HOSTIP=192.168.1.100
    command:
      - sh
      - -c
      - |
          set -e
          apk add --no-cache bind-tools
          echo '=== Waiting for containers to register ==='
          sleep 10

          check_dynamic() {
            name="$$1"
            result=$$(dig @coredns -p 54 "$$name" +short)
            echo "$$name -> $$result"
            test "$$result" = "$$HOSTIP"
          }

          echo '=== Test 1: Container with coredns.host.name label ==='
          check_dynamic test-coredns.example.com
          echo '=== Test 2: Container with joyride.host.name label (backward compat) ==='
          check_dynamic test-joyride.example.com
          echo '=== Test 3: Multiple hostnames (comma-separated) ==='
          for name in app1.example.com app2.example.com app3.example.com; do
            check_dynamic "$$name"
          done

          echo '=== Test 4: Unknown reserved domain gets no response (split DNS) ==='
          set +e
          UNKNOWN_OUTPUT=$$(dig @coredns -p 54 unknown.invalid +tries=1 +time=2 2>&1)
          UNKNOWN_STATUS=$$?
          set -e
          printf '%s\n' "$$UNKNOWN_OUTPUT"
          test "$$UNKNOWN_STATUS" -eq 9
          printf '%s\n' "$$UNKNOWN_OUTPUT" | grep -qi 'timed out'
          ! printf '%s\n' "$$UNKNOWN_OUTPUT" | grep -Eqi 'NXDOMAIN|REFUSED'

          echo '=== Test 5: Static hosts file - basic entry ==='
          STATIC_RESULT=$$(dig @coredns -p 54 static-host.example.com +short)
          echo "static-host.example.com -> $$STATIC_RESULT"
          test "$$STATIC_RESULT" = '10.99.99.1'

          echo '=== Test 6: Static hosts file - entry with alias ==='
          NAS_RESULT=$$(dig @coredns -p 54 nas.example.com +short)
          echo "nas.example.com -> $$NAS_RESULT"
          test "$$NAS_RESULT" = '10.99.99.2'
          ALIAS_RESULT=$$(dig @coredns -p 54 nas-alias +short)
          echo "nas-alias -> $$ALIAS_RESULT"
          test "$$ALIAS_RESULT" = '10.99.99.2'

          echo '=== Test 7: Static hosts file - multiple aliases ==='
          MULTI_RESULT=$$(dig @coredns -p 54 multi-alias.example.com +short)
          echo "multi-alias.example.com -> $$MULTI_RESULT"
          test "$$MULTI_RESULT" = '10.99.99.3'
          ALIAS1_RESULT=$$(dig @coredns -p 54 alias1 +short)
          echo "alias1 -> $$ALIAS1_RESULT"
          test "$$ALIAS1_RESULT" = '10.99.99.3'

          echo '=== ALL TESTS PASSED ==='
    networks:
      - test-net
    depends_on:
      - coredns
      - test-app-coredns
      - test-app-joyride
      - test-app-multi

networks:
  test-net:
    driver: bridge
