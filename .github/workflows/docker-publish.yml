name: Build and Publish Docker Image

on:
  workflow_dispatch:
  push:
    branches: [ '**' ]
    # Trigger on release tags so release-please-created tags publish a
    # semver-tagged image. paths filters cannot be used here -- they block
    # tag-push events (which lack file-change context). Build cache keeps
    # branch-push runs cheap when nothing relevant changed.
    tags: [ 'v*' ]
  pull_request:
    branches: [ "coredns" ]
    types: [ closed ]
    paths:
      - 'plugins/**/*'
      - 'Dockerfile'
      - 'Corefile'
      - 'Corefile.cluster'
      - 'go.mod'
      - 'go.sum'
      - 'plugin.cfg'
      - '.github/workflows/docker-publish.yml'
  release:
    types: [ published ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Keep in sync with the COREDNS_VERSION ARG in Dockerfile.
  COREDNS_VERSION: v1.14.3

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.25'

      - name: Download CoreDNS for plugin dependencies
        run: |
          echo "Testing with CoreDNS ${COREDNS_VERSION}"
          git clone --depth 1 --branch ${COREDNS_VERSION} https://github.com/coredns/coredns.git /tmp/coredns
          cp -r plugins/docker-cluster /tmp/coredns/plugin/docker-cluster
          cp -r plugins/traefik-externals /tmp/coredns/plugin/traefik-externals
          cp plugin.cfg /tmp/coredns/plugin.cfg

      - name: Run unit tests
        working-directory: /tmp/coredns
        run: |
          go get github.com/moby/moby/api@v1.55.0
          go get github.com/moby/moby/client@v0.5.0
          go get github.com/hashicorp/memberlist@v0.5.1
          go get github.com/fsnotify/fsnotify@v1.10.0
          go mod tidy
          test "$(go list -m -f '{{.Version}}' github.com/moby/moby/api)" = v1.55.0
          test "$(go list -m -f '{{.Version}}' github.com/moby/moby/client)" = v0.5.0
          go list -m github.com/moby/moby/api github.com/moby/moby/client
          echo "Running traefik-externals tests..."
          go test -v -timeout 60s ./plugin/traefik-externals/...
          echo "Running docker-cluster tests..."
          go test -v -timeout 60s ./plugin/docker-cluster/...

  build:
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha

      - name: Get build timestamp
        id: timestamp
        run: echo "time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: production
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COREDNS_VERSION=${{ env.COREDNS_VERSION }}
            VERSION=${{ steps.meta.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.timestamp.outputs.time }}

      - name: Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: rjstone/discord-webhook-notify@c2597273488aeda841dd1e891321952b51f7996f # v2.2.1
        with:
          severity: info
          username: MafenBot
          color: '#ff00aa'
          avatarUrl: https://github.githubassets.com/images/modules/logos_page/Octocat.png
          description: A new ${{ github.event.repository.name }} image ${{ steps.meta.outputs.tags }} has been published
          details: Based on ${{ github.event.head_commit.url }}
          footer: MafenBot became self aware
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
