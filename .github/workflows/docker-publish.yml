name: Build and Publish Docker Image

on:
  workflow_dispatch:
  push:
    branches: [ '**' ]
    # Trigger on release tags so release-please-created tags publish a
    # semver-tagged image. paths filters cannot be used here -- they block
    # tag-push events (which lack file-change context). Build cache keeps
    # branch-push runs cheap when nothing relevant changed.
    tags: [ 'v*' ]
  pull_request:
    branches: [ "coredns" ]
    types: [ closed ]
    paths:
      - 'plugins/**/*'
      - 'Dockerfile'
      - 'Corefile'
      - 'Corefile.cluster'
      - 'go.mod'
      - 'go.sum'
      - 'plugin.cfg'
      - '.github/workflows/docker-publish.yml'
  release:
    types: [ published ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Keep in sync with the COREDNS_VERSION ARG in Dockerfile.
  COREDNS_VERSION: v1.14.3

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'

      - name: Download CoreDNS for plugin dependencies
        run: |
          echo "Testing with CoreDNS ${COREDNS_VERSION}"
          git clone --depth 1 --branch ${COREDNS_VERSION} https://github.com/coredns/coredns.git /tmp/coredns
          cp -r plugins/docker-cluster /tmp/coredns/plugin/docker-cluster
          cp -r plugins/traefik-externals /tmp/coredns/plugin/traefik-externals
          cp plugin.cfg /tmp/coredns/plugin.cfg

      - name: Run unit tests
        working-directory: /tmp/coredns
        run: |
          go get github.com/docker/docker@v28.5.2+incompatible
          go get github.com/hashicorp/memberlist@v0.5.1
          go get github.com/fsnotify/fsnotify@v1.10.0
          go mod tidy
          echo "Running traefik-externals tests..."
          go test -v -timeout 60s ./plugin/traefik-externals/...
          echo "Running docker-cluster tests..."
          go test -v -timeout 60s ./plugin/docker-cluster/...

  build:
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha

      - name: Get build timestamp
        id: timestamp
        run: echo "time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          target: production
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COREDNS_VERSION=${{ env.COREDNS_VERSION }}
            VERSION=${{ steps.meta.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.timestamp.outputs.time }}

      - name: Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: rjstone/discord-webhook-notify@89b0bf43c2c8514f70d0dcba4a706b904e8a3112 # v1.0.4
        with:
          severity: info
          username: MafenBot
          color: '#ff00aa'
          avatarUrl: https://github.githubassets.com/images/modules/logos_page/Octocat.png
          description: A new ${{ github.event.repository.name }} image ${{ steps.meta.outputs.tags }} has been published
          details: Based on ${{ github.event.head_commit.url }}
          footer: MafenBot became self aware
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
